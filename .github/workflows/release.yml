name: Release

# Publishes with `bun pm pack` + `bunx npm publish --provenance` (tarball upload).
#
# Auth: npm Trusted Publishing (OIDC) — no NPM_TOKEN or NPM_CONFIG_TOKEN.
# Configure on npmjs.com: Package → Settings → Trusted Publisher → GitHub Actions
#   Repository: takara-ai/miru-code, Workflow: release.yml, Environment: (none)
#
# `id-token: write` lets GitHub mint an OIDC token for npm provenance attestation.
# npm CLI 11.5.1+ is required; `bunx npm` pulls a current npm without setup-node.
#
# `bun pm pack` skips lifecycle scripts, so prepublishOnly steps (vendor-grammars,
# typecheck, test) run explicitly before pack.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Prepublish checks
        run: bun run vendor-grammars && bun run typecheck && bun test

      - name: Pack tarball
        run: bun pm pack

      - name: Publish to npm
        run: bunx npm publish --provenance --access public ./takara-ai-miru-code-*.tgz
