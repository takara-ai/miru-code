name: Release

# Publishes with `bun publish` (pack + lifecycle scripts + registry upload).
#
# Auth: bun publish does not support npm Trusted Publishing (OIDC) yet:
#   https://github.com/oven-sh/bun/issues/22423
#   https://github.com/oven-sh/bun/pull/29374
#
# Add an npm automation token as the NPM_TOKEN repository secret:
#   https://www.npmjs.com/settings/~tokens → Generate New Token → Granular Access Token
#   Packages: read/write for @takara-ai/miru-code
#
# bun publish reads NPM_CONFIG_TOKEN (mapped from NPM_TOKEN below).
# prepublishOnly in package.json runs vendor-grammars, typecheck, and test.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Publish to npm
        run: bun publish --access public --tolerate-republish
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
