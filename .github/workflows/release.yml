name: Publish Package

# Publishes with `bun pm pack` + `npm publish` (tarball upload).
#
# Auth: npm Trusted Publishing (OIDC) — no NPM_TOKEN or NPM_CONFIG_TOKEN.
# Configure on npmjs.com: Package → Settings → Trusted Publisher → GitHub Actions
#   Repository: takara-ai/miru-code, Workflow: release.yml, Environment: (none)
#
# `id-token: write` lets GitHub mint an OIDC token for npm provenance attestation.
# `actions/setup-node@v6` with `registry-url` wires npm to OIDC trusted publishing.
#
# `bun pm pack` skips lifecycle scripts, so prepublishOnly steps (vendor-grammars,
# typecheck, test) run explicitly before pack.

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Prepublish checks
        run: bun run vendor-grammars && bun run typecheck && bun test

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Pack tarball
        run: bun pm pack

      - name: Publish to npm
        run: npm publish --access public ./takara-ai-miru-code-*.tgz
