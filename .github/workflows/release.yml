name: Release

# Bun for install, test, and pack. npm publish only for the registry upload —
# bun publish does not support npm Trusted Publishing (OIDC) yet:
# https://github.com/oven-sh/bun/issues/22423
#
# One-time npm setup (https://www.npmjs.com/package/miru-code/access):
#   1. First publish: bun publish --access public (logged in locally), or npm publish
#   2. Trusted Publisher → GitHub Actions
#      - Organization: takara-ai
#      - Repository: miru-code
#      - Workflow filename: release.yml

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify package
        run: |
          bun run typecheck
          bun test

      - name: Pack tarball
        run: bun pm pack --filename miru-code.tgz

      # npm CLI 11.x required for OIDC; do not set registry-url on setup-node.
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Publish to npm
        run: npm publish miru-code.tgz --access public
        env:
          NPM_CONFIG_PROVENANCE: false
